[options]
; --- Master password for Odoo's database manager ---------------------------
; CHANGE THIS before deploying to a public server. Generate a strong value:
;     openssl rand -base64 24
admin_passwd = REPLACE_WITH_A_STRONG_MASTER_PASSWORD

; --- Where to find this module + Odoo core addons --------------------------
addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo

; --- Public-server hardening -----------------------------------------------
; Hide the database-manager / DB list on the public web UI. The database is
; created from the CLI (see DEPLOY_AZURE.md), so the web manager isn't needed.
list_db = False

; If you put Odoo behind a reverse proxy that terminates HTTPS (see the Caddy
; appendix in DEPLOY_AZURE.md), also set:  proxy_mode = True
